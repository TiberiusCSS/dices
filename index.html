<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dice API</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #18181b;
    --border: #2a2a30;
    --accent: #e8d44d;
    --accent2: #e87d4d;
    --text: #f0ede8;
    --muted: #888;
    --red:   #e84d4d;
    --green: #4de8a0;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2.5rem;
    padding: 2rem;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: .5;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
    text-align: center;
    position: relative;
    z-index: 1;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    font-family: 'DM Mono', monospace;
    font-size: .8rem;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  /* ── dados ─────────────────────────────── */
  .dice-row {
    display: flex;
    gap: 2rem;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .die-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: .6rem;
  }

  .die-label {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
  }

  .die {
    width: 120px;
    height: 120px;
    border: 2px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: border-color .3s;
    overflow: hidden;
  }
  .die::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.04) 0%, transparent 60%);
    border-radius: inherit;
    pointer-events: none;
  }

  .die.rolling { animation: shake .5s ease; }

  @keyframes shake {
    0%,100% { transform: rotate(0deg) scale(1); }
    15%      { transform: rotate(-8deg) scale(1.05); }
    30%      { transform: rotate(7deg)  scale(1.07); }
    45%      { transform: rotate(-5deg) scale(1.04); }
    60%      { transform: rotate(4deg)  scale(1.06); }
    75%      { transform: rotate(-3deg) scale(1.03); }
  }

  .die-value {
    font-size: 3rem;
    font-weight: 800;
    color: var(--accent);
    transition: opacity .15s;
    line-height: 1;
  }
  .die-value.flash { animation: flash .4s ease; }
  @keyframes flash {
    0%,100% { opacity: 1; }
    40%     { opacity: 0; transform: scale(.7); }
  }

  .vs {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--border);
    letter-spacing: .05em;
    padding-bottom: 1.5rem;
  }

  /* ── total ─────────────────────────────── */
  .total-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.2rem 2.4rem;
    text-align: center;
    position: relative;
    z-index: 1;
    min-width: 220px;
    transition: border-color .3s;
  }
  .total-card.highlight { border-color: var(--accent); }

  .total-label {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: .4rem;
  }

  .total-value {
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    min-height: 2.4rem;
  }

  /* ── botão ─────────────────────────────── */
  button {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    background: var(--accent);
    color: #0e0e0f;
    border: none;
    border-radius: 10px;
    padding: .85rem 2.4rem;
    cursor: pointer;
    letter-spacing: .02em;
    position: relative;
    z-index: 1;
    transition: transform .12s, box-shadow .12s, background .2s;
    box-shadow: 0 4px 20px rgba(232, 212, 77, .18);
  }
  button:hover  { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,212,77,.28); }
  button:active { transform: scale(.97); }
  button:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* ── log ───────────────────────────────── */
  .log-wrap {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  .log-title {
    font-family: 'DM Mono', monospace;
    font-size: .7rem;
    color: var(--muted);
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: .6rem;
  }

  .log {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: .8rem 1rem;
    max-height: 180px;
    overflow-y: auto;
    font-family: 'DM Mono', monospace;
    font-size: .78rem;
    display: flex;
    flex-direction: column;
    gap: .35rem;
  }

  .log-entry {
    display: flex;
    gap: .8rem;
    align-items: baseline;
    animation: fadeIn .25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; } }

  .log-entry .ts  { color: var(--muted); font-size: .7rem; min-width: 56px; }
  .log-entry .d1  { color: var(--accent); }
  .log-entry .d2  { color: var(--accent2); }
  .log-entry .tot { color: var(--text); font-weight: 500; }
  .log-entry .sep { color: var(--border); }

  .log::-webkit-scrollbar { width: 4px; }
  .log::-webkit-scrollbar-track { background: transparent; }
  .log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── endpoint badge ─────────────────────── */
  .endpoint {
    font-family: 'DM Mono', monospace;
    font-size: .75rem;
    color: var(--green);
    background: rgba(77,232,160,.07);
    border: 1px solid rgba(77,232,160,.2);
    border-radius: 6px;
    padding: .3rem .8rem;
    letter-spacing: .05em;
    position: relative;
    z-index: 1;
  }

  .empty-log {
    color: var(--muted);
    text-align: center;
    padding: .4rem 0;
    font-size: .75rem;
  }
</style>
</head>
<body>

<p class="subtitle">— C HTTP API —</p>
<h1>Dice <span>Roller</span></h1>
<code class="endpoint">GET http://localhost:8080/roll</code>

<div class="dice-row">
  <div class="die-wrap">
    <span class="die-label">Dado 1</span>
    <div class="die" id="die1">
      <span class="die-value" id="val1">—</span>
    </div>
  </div>

  <span class="vs">VS</span>

  <div class="die-wrap">
    <span class="die-label">Dado 2</span>
    <div class="die" id="die2">
      <span class="die-value" id="val2">—</span>
    </div>
  </div>
</div>

<div class="total-card" id="totalCard">
  <p class="total-label">Total</p>
  <p class="total-value" id="totalVal">—</p>
</div>

<button id="rollBtn" onclick="rolar()">🎲 Rolar os dados</button>

<div class="log-wrap">
  <p class="log-title">Histórico</p>
  <div class="log" id="log">
    <p class="empty-log">Nenhuma rolagem ainda.</p>
  </div>
</div>

<script>
  let primeiraEntrada = true;

  function agora() {
    const d = new Date();
    return d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  }

  function animarDado(el, valor, delay = 0) {
    setTimeout(() => {
      el.classList.remove('flash');
      void el.offsetWidth;
      el.classList.add('flash');
      setTimeout(() => { el.textContent = valor; }, 150);
    }, delay);
  }

  async function rolar() {
    const btn = document.getElementById('rollBtn');
    btn.disabled = true;

    /* anima os dados */
    const d1 = document.getElementById('die1');
    const d2 = document.getElementById('die2');
    [d1, d2].forEach(d => { d.classList.remove('rolling'); void d.offsetWidth; d.classList.add('rolling'); });

    /* chama a API */
    let dado1, dado2, total;
    try {
      const resp = await fetch('http://localhost:8080/roll');
      if (!resp.ok) throw new Error('status ' + resp.status);
      const data = await resp.json();
      dado1 = data.dado1;
      dado2 = data.dado2;
      total = data.total;
    } catch (e) {
      /* fallback: simula localmente se a API não estiver rodando */
      dado1 = Math.floor(Math.random() * 6) + 1;
      dado2 = Math.floor(Math.random() * 6) + 1;
      total = dado1 + dado2;
      console.warn('API offline — usando simulação local:', e.message);
    }

    /* atualiza valores com delay para coincidir com animação */
    animarDado(document.getElementById('val1'), dado1, 300);
    animarDado(document.getElementById('val2'), dado2, 400);

    setTimeout(() => {
      const tc = document.getElementById('totalCard');
      document.getElementById('totalVal').textContent = total;
      tc.classList.remove('highlight');
      void tc.offsetWidth;
      tc.classList.add('highlight');
    }, 480);

    /* log */
    setTimeout(() => {
      const log = document.getElementById('log');
      if (primeiraEntrada) { log.innerHTML = ''; primeiraEntrada = false; }

      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML =
        `<span class="ts">${agora()}</span>` +
        `<span class="d1">D1: ${dado1}</span>` +
        `<span class="sep">·</span>` +
        `<span class="d2">D2: ${dado2}</span>` +
        `<span class="sep">→</span>` +
        `<span class="tot">total: ${total}</span>`;

      log.insertBefore(entry, log.firstChild);

      /* limita o log a 30 entradas */
      while (log.children.length > 30) log.removeChild(log.lastChild);
    }, 520);

    setTimeout(() => { btn.disabled = false; }, 600);
  }
</script>
</body>
</html>
